<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolsa de Invocación Épica</title>
    <meta name="theme-color" content="#8B4513">
    <meta name="description" content="Bolsa de Trucos para invocar compañeros de D&D.">
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🎒 Bolsa de Trucos (Marrón)</h1>

    <div class="result-text" id="resultText">Pulsa para invocar</div>

    <div class="summon-area">
        <div class="animal-sprite" id="animalSprite">✨</div>
        <div class="bag"></div>
    </div>

    <button class="main-button" id="rollButton" onclick="rollDice()">¡Lanzar Dado!</button>

    <!-- Modal para nombrar -->
    <div id="namingModal" class="naming-modal hidden">
        <div class="naming-content">
            <h3>¡Ha aparecido un <span id="namingSpecies"></span>!</h3>
            <input type="text" id="animalNameInput" placeholder="Nombre del compañero" maxlength="20">
            <button class="confirm-btn" onclick="confirmName()">¡A la aventura!</button>
        </div>
    </div>

    <div class="stat-card" id="statCard">
        </div>

    <!-- Pantalla de Muerte -->
    <div id="deathScreen" class="death-screen hidden">
        <div class="tombstone">🪦</div>
        <h2>R.I.P.</h2>
        <p id="deathMessage">Tu compañero ha caído en combate...</p>
        <button class="revive-btn" onclick="restartGame()">🔄 Reiniciar</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
